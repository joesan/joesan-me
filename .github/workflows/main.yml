name: Build and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: -v "content/**/*.md"
      - name: Create Issue From File
        uses: peter-evans/create-issue-from-file@v2
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue

  build:
    runs-on: macos-10.15
    if: github.ref == 'refs/heads/master'
    env:
      TARGET_BRANCH: gh-pages
    steps:
      - name: Check out repo
        uses: actions/checkout@v2
      - name: Install zola
        run: brew install zola
      - name: Generate HTML
        run: zola build
      - name: Commit and push to target branch
        run: |-
          git config --global user.email "workflow-bot@bigelectrons.com"
          git config --global user.name "workflow-bot"
          git checkout --orphan $TARGET_BRANCH
          rm -rf .github/
          mv public ..
          rm -rf *
          mv ../public/* .
          touch .nojekyll
          touch README.md
          echo 'https://www.bigelectrons.com - SITE GENERATED USING ZOLA' > README.md
          git add .
          git commit -m "generated using zola build"
          git push --set-upstream origin $TARGET_BRANCH --force