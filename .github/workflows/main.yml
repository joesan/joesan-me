name: Build and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: macos-10.15
    if: github.ref == 'refs/heads/master'
    env:
      TARGET_BRANCH: gh-pages
    steps:
      - name: Check out repo
        uses: actions/checkout@v2
      - name: Install zola
        run: brew install zola
      - name: Generate HTML
        run: zola build
      - name: Commit and push to target branch
        run: |-
          git config --global user.email "workflow-bot@bigelectrons.com"
          git config --global user.name "workflow-bot"
          git checkout --orphan $TARGET_BRANCH
          git rm --cached -r .
          mv public ..
          rm -rf *
          mv ../public/* .
          touch .nojekyll
          git add .
          git commit -m "generated using zola build"
          git push --set-upstream origin $TARGET_BRANCH --force